name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE*"
      - "**/*.png"
      - "**/*.jpg"
      - "**/*.svg"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE*"
      - "**/*.png"
      - "**/*.jpg"
      - "**/*.svg"
  workflow_dispatch:
    inputs:
      run_integration_tests:
        description: "Run integration tests (spins up Docker services per suite)"
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  lint:
    name: Lint & Static Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          # Use a unified cache key to allow sharing across jobs
          key: lint-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting (rustfmt)
        id: fmt
        run: cargo fmt --all --check

      - name: Run lint checks (clippy)
        id: lint
        # Assuming 'make lint' runs 'cargo clippy'
        run: make lint

      # - name: Check for typos
      #   id: typos
      #   # Assuming 'make typos' runs the typos checker
      #   run: make typos

      - name: Run cargo check
        id: check
        run: cargo check --workspace --all-targets --all-features

      - name: Summarize lint issues
        if: always()
        run: |
          echo "## 🔍 Lint & Static Check Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Overall status check
          if [ "${{ steps.fmt.outcome }}" == "success" ] && \
             [ "${{ steps.lint.outcome }}" == "success" ] && \
             [ "${{ steps.check.outcome }}" == "success" ]; then
            echo "✅ **All checks passed!**" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          echo "❌ **One or more checks failed.**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Individual check results
          [ "${{ steps.fmt.outcome }}" == "failure" ] && echo "❌ **rustfmt:** Code formatting issues detected." >> $GITHUB_STEP_SUMMARY
          [ "${{ steps.lint.outcome }}" == "failure" ] && echo "❌ **Clippy:** Code quality issues detected." >> $GITHUB_STEP_SUMMARY
          [ "${{ steps.check.outcome }}" == "failure" ] && echo "❌ **cargo check:** Compilation errors detected." >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📋 **Next steps:** Review the logs for details and correct the identified issues." >> $GITHUB_STEP_SUMMARY

  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          # Use a unified cache key to allow sharing across jobs
          key: test-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          # Also allow restoring from the lint cache if available
          restore-keys: |
            lint-${{ runner.os }}-

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Run unit tests with nextest
        run: |
          cargo nextest run \
            --workspace \
            --exclude dt-tests \
            --lib --bins \
            --no-fail-fast

      - name: Run doc tests
        run: cargo test --workspace --doc --exclude dt-tests

  integration-test:
    name: "Integration / ${{ matrix.suite }}"
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_integration_tests == true }}
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        include:
          # ── MySQL ──────────────────────────────────────────────────────────
          - suite: mysql_to_mysql
            services: mysql-src mysql-dst mysql-meta
            filter: "test(mysql_to_mysql::)"

          - suite: mysql_to_mysql_case_sensitive
            services: mysql-src-8-0 mysql-dst-8-0
            filter: "test(mysql_to_mysql_case_sensitive::)"

          - suite: mysql_to_mysql_lua
            services: mysql-src mysql-dst mysql-meta
            filter: "test(mysql_to_mysql_lua::)"

          # ── PostgreSQL ─────────────────────────────────────────────────────
          - suite: pg_to_pg
            services: postgres-src postgres-dst postgres-node3
            filter: "test(pg_to_pg::)"

          - suite: pg_to_pg_lua
            services: postgres-src postgres-dst
            filter: "test(pg_to_pg_lua::)"

          # ── MongoDB ────────────────────────────────────────────────────────
          - suite: mongo_to_mongo
            services: mongo-src mongo-dst
            filter: "test(mongo_to_mongo::)"

          # ── Redis 7.0 + Graph ──────────────────────────────────────────────
          # Only 7.0 and FalkorDB/graph are in docker-compose.ci.yml.
          # Multi-version suites (2.8/4.0/5.0/6.0/6.2/8.0) are excluded from CI.
          - suite: redis_to_redis_7_0
            services: redis-src redis-dst
            filter: "test(redis_to_redis::cdc_7_0) | test(redis_to_redis::snapshot_7_0) | test(redis_to_redis::snapshot_and_cdc_7_0)"

          - suite: redis_to_redis_graph
            services: falkordb-src falkordb-dst
            filter: "test(redis_to_redis::cdc_graph) | test(redis_to_redis::snapshot_graph)"

          # ── Cross-stack ────────────────────────────────────────────────────
          - suite: mysql_to_clickhouse
            services: mysql-src clickhouse
            filter: "test(mysql_to_clickhouse::)"

          - suite: pg_to_clickhouse
            services: postgres-src clickhouse
            filter: "test(pg_to_clickhouse::)"

          - suite: mysql_to_redis
            services: mysql-src redis-dst
            filter: "test(mysql_to_redis::)"

          - suite: log_reader
            services: mysql-src postgres-src mongo-src
            filter: "test(log_reader::)"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Start required services
        working-directory: dt-tests
        run: docker compose -f docker-compose.ci.yml up -d ${{ matrix.services }}

      - name: Wait for services to be healthy
        working-directory: dt-tests
        run: |
          timeout 120 bash -c '
            while docker compose -f docker-compose.ci.yml ps | grep -q "starting"; do
              echo "Waiting for containers to finish starting..."
              sleep 5
            done
            echo "All services ready."
          '

      - name: Initialize MongoDB replica sets
        if: contains(matrix.services, 'mongo')
        working-directory: dt-tests
        run: |
          if echo "${{ matrix.services }}" | grep -q "mongo-src"; then
            docker compose -f docker-compose.ci.yml exec -T mongo-src \
              mongosh --eval 'rs.initiate({_id:"rs0",members:[{_id:0,host:"mongo-src:27017"}]})'
            sleep 3
          fi
          if echo "${{ matrix.services }}" | grep -q "mongo-dst"; then
            docker compose -f docker-compose.ci.yml exec -T mongo-dst \
              mongosh --eval 'rs.initiate({_id:"rs1",members:[{_id:0,host:"mongo-dst:27017"}]})'
            sleep 3
          fi

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: integration-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Run integration tests — ${{ matrix.suite }}
        working-directory: dt-tests
        env:
          ENV_FILE_PATH: .env.ci
        run: |
          cargo nextest run \
            --package dt-tests \
            --test integration_test \
            --no-fail-fast \
            -E "${{ matrix.filter }}"

      - name: Dump container logs on failure
        if: failure()
        working-directory: dt-tests
        run: docker compose -f docker-compose.ci.yml logs --tail=200

      - name: Stop services
        if: always()
        working-directory: dt-tests
        run: docker compose -f docker-compose.ci.yml down -v
