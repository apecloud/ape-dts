services:
  # MySQL instances for testing
  mysql-src:
    image: mysql:8.0
    container_name: mysql-src-ci
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: test_db
    ports:
      - "3307:3306"
    command:
      - mysqld
      - --server-id=1
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --gtid-mode=ON
      - --enforce-gtid-consistency=ON
      - --log-slave-updates=ON
      - --character-set-server=utf8mb3
      - --collation-server=utf8mb3_general_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p123456"]
      timeout: 5s
      retries: 5
      start_period: 20s
      interval: 5s

  mysql-dst:
    image: mysql:8.0
    container_name: mysql-dst-ci
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: test_db
    ports:
      - "3308:3306"
    command:
      - mysqld
      # Kept enabled because mysql-dst is reused as node2/source in mysql_to_mysql cycle CDC tests.
      - --server-id=2
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --gtid-mode=ON
      - --enforce-gtid-consistency=ON
      - --log-slave-updates=ON
      - --character-set-server=utf8mb3
      - --collation-server=utf8mb3_general_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p123456"]
      timeout: 5s
      retries: 5
      start_period: 20s
      interval: 5s

  mysql-meta:
    image: mysql:8.0
    container_name: mysql-meta-ci
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: test_db
    ports:
      - "3309:3306"
    command:
      - mysqld
      - --server-id=3
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --gtid-mode=ON
      - --enforce-gtid-consistency=ON
      - --log-slave-updates=ON
      - --character-set-server=utf8mb3
      - --collation-server=utf8mb3_general_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p123456"]
      timeout: 5s
      retries: 5
      start_period: 20s
      interval: 5s

  mysql-src-8-0:
    image: mysql:8.0
    container_name: mysql-src-8-0
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: test_db
    ports:
      - "3311:3306"
    command:
      - mysqld
      - --server-id=11
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --character-set-server=utf8mb3
      - --collation-server=utf8mb3_general_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p123456"]
      timeout: 5s
      retries: 5
      start_period: 20s
      interval: 5s

  mysql-dst-8-0:
    image: mysql:8.0
    container_name: mysql-dst-8-0
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: test_db
    ports:
      - "3312:3306"
    command:
      - mysqld
      - --server-id=12
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --character-set-server=utf8mb3
      - --collation-server=utf8mb3_general_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p123456"]
      timeout: 5s
      retries: 5
      start_period: 20s
      interval: 5s

  # PostgreSQL instances
  postgres-src:
    image: postgis/postgis:13-3.4
    container_name: postgres-src-ci
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5433:5432"
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_wal_senders=10
      - -c
      - max_replication_slots=10
    volumes:
      - ./docker/postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "psql -U postgres -c 'SELECT 1'"]
      timeout: 5s
      retries: 5
      start_period: 20s
      interval: 5s

  postgres-node3:
    image: postgis/postgis:13-3.4
    container_name: postgres-node3-ci
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5435:5432"
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_wal_senders=10
      - -c
      - max_replication_slots=10
    healthcheck:
      test: ["CMD-SHELL", "psql -U postgres -c 'SELECT 1'"]
      timeout: 5s
      retries: 5
      start_period: 20s
      interval: 5s

  postgres-dst:
    image: postgis/postgis:13-3.4
    container_name: postgres-dst-ci
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5434:5432"
    command:
      - postgres
      # Kept enabled because postgres-dst is reused as node2/source in pg_to_pg cycle CDC tests.
      - -c
      - wal_level=logical
      - -c
      - max_wal_senders=10
      - -c
      - max_replication_slots=10
    volumes:
      - ./docker/postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "psql -U postgres -c 'SELECT 1'"]
      timeout: 5s
      retries: 5
      start_period: 20s
      interval: 5s

  # MongoDB instances
  mongo-src:
    image: mongo:4.4
    container_name: mongo-src-ci
    ports:
      - "27017:27017"
    volumes:
      - ./docker/mongo-init/mongo-keyfile:/run/secrets/mongo-keyfile:ro
      - ./docker/mongo-init/start-mongo-rs.sh:/usr/local/bin/start-mongo-rs.sh:ro
    entrypoint:
      - bash
      - /usr/local/bin/start-mongo-rs.sh
    healthcheck:
      test: ["CMD", "mongo", "admin", "-u", "root", "-p", "123456", "--quiet", "--eval", "quit(db.isMaster().ismaster ? 0 : 1)"]
      timeout: 5s
      retries: 5
      start_period: 20s
      interval: 5s

  mongo-dst:
    image: mongo:4.4
    container_name: mongo-dst-ci
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: 123456
    ports:
      - "27016:27017"
    command: mongod --bind_ip_all
    healthcheck:
      test: ["CMD", "mongo", "admin", "-u", "root", "-p", "123456", "--eval", "db.adminCommand('ping')"]
      timeout: 5s
      retries: 5
      start_period: 20s
      interval: 5s

  # Redis instances
  redis-src:
    image: redis:7.0
    container_name: redis-src-ci
    ports:
      - "6380:6379"
    command: redis-server --requirepass 123456 --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "123456", "ping"]
      timeout: 5s
      retries: 5
      start_period: 10s
      interval: 3s

  redis-dst:
    image: redis:7.0
    container_name: redis-dst-ci
    ports:
      - "6390:6379"
    command: redis-server --requirepass 123456 --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "123456", "ping"]
      timeout: 5s
      retries: 5
      start_period: 10s
      interval: 3s

  # FalkorDB (RedisGraph) instances
  falkordb-src:
    image: falkordb/falkordb:v4.12.5
    container_name: falkordb-src-ci
    ports:
      - "6381:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "123456", "ping"]
      timeout: 5s
      retries: 5
      start_period: 10s
      interval: 3s
    environment:
      - REDIS_ARGS=--requirepass 123456 --save 60 1 --loglevel warning
      - FALKORDB_ARGS=MAX_INFO_QUERIES 0

  falkordb-dst:
    image: falkordb/falkordb:v4.12.5
    container_name: falkordb-dst-ci
    ports:
      - "6391:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "123456", "ping"]
      timeout: 5s
      retries: 5
      start_period: 10s
      interval: 3s
    environment:
      - REDIS_ARGS=--requirepass 123456 --save 60 1 --loglevel warning
      - FALKORDB_ARGS=MAX_INFO_QUERIES 0

  # ClickHouse for testing
  clickhouse:
    image: clickhouse/clickhouse-server:24.10
    container_name: clickhouse-ci
    environment:
      CLICKHOUSE_USER: admin
      CLICKHOUSE_PASSWORD: 123456
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "8123:8123"
      - "9000:9000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      timeout: 5s
      retries: 5
      start_period: 20s
      interval: 5s

networks:
  default:
    name: ape-dts-ci-network
