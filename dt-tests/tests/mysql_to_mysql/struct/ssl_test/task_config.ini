[extractor]
extract_type=struct
db_type=mysql
url={mysql_extractor_without_auth_url}
username={mysql_extractor_username}
password={mysql_extractor_password}
ssl_mode=require

[sinker]
sink_type=struct
db_type=mysql
batch_size=1
url={mysql_sinker_without_auth_url}
username={mysql_sinker_username}
password={mysql_sinker_password}
conflict_policy=interrupt
ssl_mode=require

[filter]
do_dbs=struct_ssl_it_mysql2mysql
ignore_dbs=
do_tbs=
ignore_tbs=
do_events=

[router]
db_map=
tb_map=
col_map=

[runtime]
log_level=info
log4rs_file=./log4rs.yaml
log_dir=./logs

[parallelizer]
parallel_type=serial
parallel_size=1

[pipeline]
checkpoint_interval_secs=1
buffer_size=100
