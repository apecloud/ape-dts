[extractor]
db_type=mysql
extract_type=snapshot
url={mysql_extractor_without_auth_url}
username={mysql_extractor_username}
password={mysql_extractor_password}
ssl_enable=true
ssl_ca_path={mysql_extractor_ssl_ca_path}

[sinker]
db_type=mysql
sink_type=write
url={mysql_sinker_without_auth_url}
username={mysql_sinker_username}
password={mysql_sinker_password}
batch_size=2
ssl_enable=true
ssl_ca_path={mysql_sinker_ssl_ca_path}

[filter]
do_tbs=test_db_1.one_pk_no_uk
do_events=insert

[router]
db_map=
tb_map=
col_map=

[parallelizer]
parallel_type=snapshot
parallel_size=2

[pipeline]
buffer_size=4
checkpoint_interval_secs=1

[runtime]
log_level=info
log4rs_file=./log4rs.yaml
log_dir=./logs
