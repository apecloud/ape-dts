[extractor]
db_type=mysql
extract_type=snapshot
url={mysql_extractor_url}

[sinker]
db_type=mysql
sink_type=write
url={mysql_sinker_url}
batch_size=100

[filter]
do_dbs=sbtest
ignore_dbs=
do_tbs=
ignore_tbs=
do_events=insert

[router]
db_map=
tb_map=
col_map=

[parallelizer]
parallel_type=snapshot
parallel_size=4

[pipeline]
buffer_size=160000
checkpoint_interval_secs=1
buffer_memory_mb=10
max_rps=10000
max_bps=20000000

[runtime]
tb_parallel_size=2
log_level=info
log4rs_file=./log4rs.yaml
log_dir=./logs