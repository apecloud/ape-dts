[extractor]
db_type=mysql
extract_type=snapshot
url={mysql_extractor_without_auth_url}
username={mysql_extractor_username}
password={mysql_extractor_password}

[sinker]
db_type=mysql
sink_type=write
url={mysql_sinker_without_auth_url}
username={mysql_sinker_username}
password={mysql_sinker_password}
batch_size=100
# [read_uncommitted, read_committed, repeatable_read, serializable, default]
transaction_isolation=read_committed
disable_foreign_key_checks=true

[filter]
do_dbs=
ignore_dbs=
do_tbs=test_db_1.large_packet_table
ignore_tbs=
do_events=insert

[router]
db_map=
tb_map=
col_map=

[parallelizer]
parallel_type=snapshot
parallel_size=1

[pipeline]
buffer_size=100
checkpoint_interval_secs=1
batch_sink_interval_secs=5

[runtime]
log_level=info
log4rs_file=./log4rs.yaml
log_dir=./logs