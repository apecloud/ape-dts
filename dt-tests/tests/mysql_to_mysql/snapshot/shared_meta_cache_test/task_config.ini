[extractor]
db_type=mysql
extract_type=snapshot
url={mysql_extractor_without_auth_url}
username={mysql_extractor_username}
password={mysql_extractor_password}
parallel_size=1
parallel_type=table
batch_size=128
max_connections=16

[sinker]
db_type=mysql
sink_type=write
url={mysql_sinker_without_auth_url}
username={mysql_sinker_username}
password={mysql_sinker_password}
batch_size=1
max_connections=16
transaction_isolation=read_committed
disable_foreign_key_checks=true

[filter]
do_tbs=meta_cache_test_db.same_schema_fetch
do_events=insert

[router]
db_map=
tb_map=
col_map=

[parallelizer]
parallel_type=snapshot
parallel_size=32
rebalance_strategy=table_min_rows

[pipeline]
buffer_size=128
batch_sink_interval_secs=1
checkpoint_interval_secs=1

[runtime]
log_level=info
log4rs_file=./log4rs.yaml
log_dir=./logs
