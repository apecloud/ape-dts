[extractor]
extract_type=struct
db_type=pg
url={pg_extractor_without_auth_url}
username={pg_extractor_username}
password={pg_extractor_password}
ssl_mode=require

[sinker]
sink_type=struct
db_type=pg
batch_size=1
url={pg_sinker_without_auth_url}
username={pg_sinker_username}
password={pg_sinker_password}
conflict_policy=interrupt
ssl_mode=require

[filter]
do_dbs=struct_ssl_it_pg2pg
ignore_dbs=
do_tbs=
ignore_tbs=
do_events=
do_structures=database,table,constraint,sequence,comment,index

[router]
db_map=
tb_map=
col_map=

[runtime]
log_level=info
log4rs_file=./log4rs.yaml
log_dir=./logs

[parallelizer]
parallel_type=serial
parallel_size=1

[pipeline]
checkpoint_interval_secs=1
buffer_size=100
