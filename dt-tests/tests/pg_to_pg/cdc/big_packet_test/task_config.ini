[extractor]
db_type=pg
extract_type=cdc
url={pg_extractor_without_auth_url}
username={pg_extractor_username}
password={pg_extractor_password}
start_lsn=
slot_name=ape_test
recreate_slot_if_exists=true
heartbeat_interval_secs=1
heartbeat_tb=heartbeat_db.ape_dts_heartbeat

[filter]
do_dbs=
ignore_dbs=
do_tbs=test_db_1.large_packet_table
ignore_tbs=
do_events=insert,update,delete

[sinker]
db_type=pg
sink_type=write
url={pg_sinker_without_auth_url}
username={pg_sinker_username}
password={pg_sinker_password}
batch_size=100

[router]
db_map=
tb_map=
col_map=

[parallelizer]
parallel_type=rdb_merge
parallel_size=1

[pipeline]
buffer_size=100
checkpoint_interval_secs=1

[runtime]
log_level=info
log4rs_file=./log4rs.yaml
log_dir=./logs
