[extractor]
db_type=pg
extract_type=snapshot
url={pg_extractor_without_auth_url}
username={pg_extractor_username}
password={pg_extractor_password}

[sinker]
db_type=pg
sink_type=write
url={pg_sinker_without_auth_url}
username={pg_sinker_username}
password={pg_sinker_password}
batch_size=100

[filter]
do_dbs=
ignore_dbs=
do_tbs=test_db_1.large_packet_table
ignore_tbs=
do_events=insert

[router]
db_map=
tb_map=
col_map=

[parallelizer]
parallel_type=snapshot
parallel_size=1

[pipeline]
buffer_size=100
checkpoint_interval_secs=1
batch_sink_interval_secs=5

[runtime]
log_level=info
log4rs_file=./log4rs.yaml
log_dir=./logs
