[extractor]
db_type=pg
extract_type=snapshot
url={pg_extractor_without_auth_url}
username={pg_extractor_username}
password={pg_extractor_password}
parallel_size=1
parallel_type=table
batch_size=128
max_connections=4

[sinker]
db_type=pg
sink_type=write
url={pg_sinker_without_auth_url}
username={pg_sinker_username}
password={pg_sinker_password}
batch_size=1
max_connections=16

[filter]
do_tbs=meta_cache_test_db.same_schema_fetch
do_events=insert

[router]
db_map=
tb_map=
col_map=

[parallelizer]
parallel_type=snapshot
parallel_size=32
rebalance_strategy=table_min_rows

[pipeline]
buffer_size=128
batch_sink_interval_secs=1
checkpoint_interval_secs=1

[runtime]
log_level=info
log4rs_file=./log4rs.yaml
log_dir=./logs
