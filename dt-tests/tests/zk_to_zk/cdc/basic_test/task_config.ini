[extractor]
db_type=zk
extract_type=cdc
url=localhost:2181
watch_paths=/app,/config
scan_interval_secs=5
include_ephemeral=false
heartbeat_interval_secs=10

[zk_filter]
do_paths=*
ignore_paths=/zookeeper
include_ephemeral=false

[sinker]
db_type=zk
sink_type=write
url=localhost:2182
batch_size=1
create_if_not_exists=true
sync_ephemeral_as_persistent=true
conflict_policy=last_write_wins

[router]
path_prefix_map=

[pipeline]
buffer_size=4
checkpoint_interval_secs=1

[parallelizer]
parallel_type=serial
parallel_size=1

[runtime]
log_level=info
log4rs_file=./log4rs.yaml
log_dir=./logs
