[extractor]
db_type=zk
extract_type=cdc
url=localhost:2182
watch_paths=/app
scan_interval_secs=5
include_ephemeral=false
heartbeat_interval_secs=10

[zk_filter]
do_paths=/app
ignore_paths=/zookeeper,/__ape_dts_heartbeat,/__ape_dts_marker,/__ape_dts_shadow
include_ephemeral=false

[data_marker]
topo_name=topo1
topo_nodes=node1,node2
src_node=node2
dst_node=node1
do_nodes=node2
ignore_nodes=node1
marker=/__ape_dts_marker

[sinker]
db_type=zk
sink_type=write
url=localhost:2181
batch_size=200
create_if_not_exists=true
sync_ephemeral_as_persistent=false
conflict_policy=last_write_wins

[router]
db_map=
col_map=
tb_map=

[parallelizer]
parallel_type=serial
parallel_size=1

[pipeline]
buffer_size=100
checkpoint_interval_secs=1

[runtime]
log_level=info
log4rs_file=./log4rs.yaml
log_dir=./logs
